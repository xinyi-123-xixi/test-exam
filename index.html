<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>极简测试</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .btn { padding: 10px 20px; background: #4f6ef7; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
        #preview { margin-top: 20px; border: 1px solid #ccc; padding: 15px; }
        .question { margin-bottom: 15px; padding: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>
    <h2>极简测试 - 智谱 API 出题</h2>
    <textarea id="notes" rows="6" cols="80" placeholder="请粘贴至少200字的笔记内容...">这是一段测试笔记，内容足够长，超过了200个字符。人工智能是计算机科学的一个分支，它企图了解智能的实质，并生产出一种新的能以人类智能相似的方式做出反应的智能机器。</textarea><br>
    <button class="btn" id="generate-btn">🎯 生成试卷</button>
    <div id="preview"></div>

    <script>
        // 智谱配置（请替换为您的真实 Key）
        const API_URL = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
        const API_KEY = 'ee8ed5b1897242d6be8389dcf7437572.qezzF0yP5pT95DA7';  // ⚠️ 替换这里
        const MODEL = 'glm-4-flash';

        // 简易工具函数
        function cleanText(str) { return str ? str.replace(/[^\x00-\x7F\u4e00-\u9fa5]/g, '').trim() : ''; }
        function toast(msg) { alert(msg); }

        // AI 出题引擎（极简版）
        async function generatePaper(content, paperName) {
            const prompt = `你是教育专家。基于笔记生成试卷，严格输出20道题：7单选（4选项）、7多选（5选项）、6判断。题目完整，选项至少5字。只输出JSON格式。笔记：${content.substring(0, 8000)}`;

            console.log('开始请求 API...');
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type':'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [
                        { role: 'system', content: '你只返回纯净JSON。' },
                        { role: 'user', content: prompt }
                    ],
                    temperature: 0.2,
                    max_tokens: 4000
                })
            });

            if (!response.ok) {
                const err = await response.text();
                throw new Error(`HTTP ${response.status}: ${err}`);
            }

            const data = await response.json();
            console.log('API 原始返回:', data);
            const aiOutput = data.choices[0].message.content;
            const jsonStr = aiOutput.replace(/```json|```/g, '').trim();
            const result = JSON.parse(jsonStr);

            if (!result.questions || result.questions.length < 20) {
                throw new Error('题目数量不足20题');
            }

            // 简单清洗
            result.questions = result.questions.slice(0, 20).map(q => {
                q.text = cleanText(q.text) || `第?题`;
                q.options = (q.options || []).map(o => cleanText(o) || '选项');
                q.explanation = cleanText(q.explanation || '无解析');
                return q;
            });

            return { name: paperName, questions: result.questions };
        }

        // 预览函数
        function showPreview(paper) {
            let html = `<h3>试卷预览：${paper.name}</h3>`;
            paper.questions.forEach((q, idx) => {
                html += `<div class="question">
                    <strong>第${idx+1}题</strong> (${q.type})<br>
                    ${q.text}<br>`;
                if (q.type !== 'judge') {
                    q.options.forEach((opt, oi) => html += `${String.fromCharCode(65+oi)}. ${opt}<br>`);
                }
                html += `<small>答案：${q.correctAnswer || q.correctLabel || (q.correctLabels||[]).join(',')}</small><br>
                <small>解析：${q.explanation}</small></div>`;
            });
            document.getElementById('preview').innerHTML = html;
        }

        // 按钮事件
        document.getElementById('generate-btn').addEventListener('click', async () => {
            const content = document.getElementById('notes').value.trim();
            if (content.length < 200) {
                toast('笔记内容不足200字，请粘贴更多内容');
                return;
            }
            const btn = document.getElementById('generate-btn');
            btn.disabled = true;
            btn.textContent = '⏳ 生成中...';
            try {
                const paper = await generatePaper(content, '测试卷');
                console.log('生成成功', paper);
                showPreview(paper);
            } catch (e) {
                console.error('生成失败', e);
                toast('生成失败：' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🎯 生成试卷';
            }
        });
    </script>
</body>
</html>
